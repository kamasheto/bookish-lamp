name: CI Pipeline

on:
  push:

jobs:
  linter:
     runs-on: ubuntu-latest
     steps:
       - name: Checkout code
         uses: actions/checkout@v6

       - name: Set up Node.js
         uses: actions/setup-node@v6
         with:
           node-version: 26
           cache: "npm"

       - name: Install dependencies
         run: npm ci

       - name: Run linter
         run: npm run lint

       - name: Run tester
         run: npm run test
